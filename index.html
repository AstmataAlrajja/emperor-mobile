<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز الإمبراطور للموبايل</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:#111;
color:white;
}

header{
background:#c00000;
padding:20px;
text-align:center;
}

.logo{
width:120px;
border-radius:10px;
}

.section{
padding:20px;
}

.card{
background:#222;
padding:15px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #c00000;
}

.price{
color:#00ff66;
font-size:20px;
font-weight:bold;
}

.btn{
background:#c00000;
color:white;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
  <img src="images/logo.jpg" width="150">
<h1>مركز الإمبراطور للموبايل</h1>
<p>بغداد - الأمين الثانية</p>
</header>

<div class="section">

<h2>الأجهزة الجديدة</h2>

<div class="card">
<h3>iPhone 15 Pro Max</h3>
<p class="price">1,850,000 د.ع</p>
<button class="btn">حجز الجهاز</button>
</div>

<h2>الأجهزة المستعملة</h2>

<div class="card">
<h3>Samsung S23 Ultra</h3>
<p class="price">950,000 د.ع</p>
<button class="btn">حجز الجهاز</button>
</div>

</div>

</body>
</html>
